<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.touchswipe/1.6.19/jquery.touchSwipe.min.js"></script>
</head>
<body>

    <main>

        <!-- Produtos -->
        <div class="produtos">
            <div class="produto">
            <h3>Produto 1</h3>
            <p>Descrição do produto 1.</p>
            <p>Preço: R$ 10,00</p>
            <button class="adicionar-ao-carrinho" data-nome="Produto 1" data-preco="10.00">Adicionar ao carrinho</button>
            </div>
            <div class="produto">
            <h3>Produto 2</h3>
            <p>Descrição do produto 2.</p>
            <p>Preço: R$ 20,00</p>
            <button class="adicionar-ao-carrinho" data-nome="Produto 2" data-preco="20.00">Adicionar ao carrinho</button>
            </div>
            <div class="produto">
            <h3>Produto 3</h3>
            <p>Descrição do produto 3.</p>
            <p>Preço: R$ 30,00</p>
            <button class="adicionar-ao-carrinho" data-nome="Produto 3" data-preco="30.00">Adicionar ao carrinho</button>
            </div>
        </div>
        
        <!-- Carrinho -->
        <div class="carrinho">
            <h3>Carrinho de compras</h3>
            <ul class="itens"></ul>
            <p>Total: R$ <span class="total">0.00</span></p>
            <button class="enviar-whatsapp">Enviar para o WhatsApp</button>
        </div>


    </main>
    <script src="script-carrinho.js"></script>
</body>
</html>
