<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="#">Logo</a>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Carrinho</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="container">
            <h1>Produtos</h1>
            <div class="produto">
                <img src="produto1.jpg" alt="Produto 1">
                <h2>Produto 1</h2>
                <p>R$ 50,00</p>
                <button class="comprar" data-nome="Produto 1" data-preco="50.00">Comprar</button>
            </div>
            <div class="produto">
                <img src="produto2.jpg" alt="Produto 2">
                <h2>Produto 2</h2>
                <p>R$ 70,00</p>
                <button class="comprar" data-nome="Produto 2" data-preco="70.00">Comprar</button>
            </div>
        </div>
    </main>
    
    <footer>
        <p>Todos os direitos reservados - Site de Vendas</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
