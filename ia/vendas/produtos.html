<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="#">Logo</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Carrinho</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>
    
    <main>

        <button id="ordenar-por-nome">Ordenar por Nome</button>
        <button id="ordenar-por-valor">Ordenar por Valor</button>
        <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Valor</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Produto A</td>
                <td>Descrição do Produto A</td>
                <td>R$ 100,00</td>
              </tr>
              <tr>
                <td>Produto B</td>
                <td>Descrição do Produto B</td>
                <td>R$ 50,00</td>
              </tr>
              <tr>
                <td>Produto C</td>
                <td>Descrição do Produto C</td>
                <td>R$ 200,00</td>
              </tr>
            </tbody>
          </table>
    </main>
    
    <footer>
        <p>Todos os direitos reservados - Site de Vendas</p>
    </footer>

    <script src="produtos.js"></script>
</body>
</html>
