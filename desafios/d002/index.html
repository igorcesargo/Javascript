<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Desafio boas-vindas</title>

    <style>

        body{
            font-weight: 800;
        }

        h1{
           font-size: 3.4em; 
        }

        button{
            width: 200px;
            height: 80px;

            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <h1>Boas-vindas</h1>
    <button onclick="clicou()">Inicie o desafio</button>

    <script>
        function  clicou() {
            var nome = prompt('Qual seu nome')
            var idade = prompt(`Olá, ${nome}! Quantos anos você tem?`)
            alert(`Acabei de conhecer ${nome}, que tem ${idade} anos de idade!`)
            
        }

        
      
    </script>
</body>
</html>
