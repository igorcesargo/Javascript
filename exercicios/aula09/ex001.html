<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>
        body{
            background-color: rgb(68, 125, 199);
            color: white;
            font: normal 18pt Arial;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos DOM</h1>
    <p>Aqui vai o resultado</p>
    <p>Aprendendo a usar o <strong>DOM</strong> em JavaScript.</p>
    <div id="msg">clique em mim</div> <br>

    <div class="msg">clique em mim</div> <br>

    <div class="msge">clique em mim</div> <br>


    <script>
        var p1 = window.document.getElementsByTagName('p')[0]
        window.document.write('Esta escrito assim: ' + p1.innerText )
        var d = window.document.getElementById('msg')
        d.style.background = 'green'
        d.innerText = 'Estou aguardando...'
       
        var B = window.document.getElementsByClassName('msg')[0]
        B.innerText = 'Olá'

        var A = window.document.querySelector('div.msge') //seletor por class
        A.style.background = 'blue'

        var C = window.document.querySelector('div#msg') //seletor por id
        C.style.background = 'red'

    </script>
    
</body>
</html>
